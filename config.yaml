# 策略组配置
proxy-groups:
  - name: Auto-Feiniaoyun
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50 # 降低容忍度，只要有更好的马上切（或者设大一点防抖动，建议50）
    timeout: 3000
    lazy: false
    hidden: true
    use:
      - FeiniaoYun

  - name: Auto-V2Free
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50
    timeout: 3000
    lazy: false
    hidden: true
    use:
      - V2Free

  - name: Auto-Feiniaoyun-AI
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50 # 降低容忍度，只要有更好的马上切（或者设大一点防抖动，建议50）
    timeout: 3000
    lazy: false
    hidden: true
    use:
      - FeiniaoYun-AI

  - name: Auto-V2Free-AI
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50
    timeout: 3000
    lazy: false
    hidden: true
    use:
      - V2Free-AI

  - name: Select-Feiniaoyun-AI
    type: select
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50 # 降低容忍度，只要有更好的马上切（或者设大一点防抖动，建议50）
    timeout: 3000
    lazy: false
    use:
      - FeiniaoYun-AI

  - name: Select-V2Free-AI
    type: select
    url: https://www.gstatic.com/generate_204
    interval: 60 # 60秒测速一次
    tolerance: 50
    timeout: 3000
    lazy: false
    use:
      - V2Free-AI

  # 【优化点3】PROXY_COMMON 改为 fallback
  # 逻辑：优先尝试 V2Free 的自动选择，如果挂了/超时，自动降级到 Feiniaoyun
  # 这比 url-test 更稳定，不会因为两个都慢而选不出来
  - name: PROXY_COMMON
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60
    timeout: 3000 # 3秒不通就切换到下一个
    lazy: false
    proxies:
      - Auto-V2Free     # 主力
      - Auto-Feiniaoyun # 备用

  - name: PROXY_AI
    type: select
    url: https://www.gstatic.com/generate_204
    interval: 60
    timeout: 3000
    lazy: false
    proxies:
      - Auto-Feiniaoyun-AI
      - Auto-V2Free-AI
      - Select-Feiniaoyun-AI
      - Select-V2Free-AI
      
  - name: GLOBAL_USE
    type: select
    proxies:
      - PROXY_COMMON
      - DIRECT
    use:
      - V2Free
      - FeiniaoYun
    
  - name: SERVER
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    lazy: false
    proxies:
      - Auto-V2Free
      - Auto-Feiniaoyun

