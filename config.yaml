mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
# 开启 TCP 并发，显著降低握手延迟 (Meta内核特性)
tcp-concurrent: true 
clash-for-android:
    append-system-dns: false
unified-delay: true
keep-alive-interval: 30

hosts:
    mtalk.google.com: 108.177.125.188

dns:
    enable: true
    ipv6: false
    listen: '127.0.0.1:53'
    default-nameserver: 
      - 223.5.5.5
      - 119.29.29.29
    proxy-server-nameserver: 
      - 223.5.5.5
      - 119.29.29.29
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    
    nameserver-policy:
      geosite:google,youtube,telegram,gfw,openai,anthropic: 'https://1.1.1.1/dns-query'
      +.google.com: 'https://1.1.1.1/dns-query'
      +.gstatic.com: 'https://1.1.1.1/dns-query'
      +.googleapis.com: 'https://1.1.1.1/dns-query'
      +.googleusercontent.com: 'https://1.1.1.1/dns-query'
      +.github.com: 'https://1.1.1.1/dns-query'
    
    nameserver: 
      - 223.5.5.5
      - 119.29.29.29
      # 备用，防止阿里挂了
      - 114.114.114.114
    
    fallback: 
      - 'https://1.1.1.1/dns-query'
      - 'https://8.8.8.8/dns-query'
      - 'tcp://8.8.8.8:53'
      - 'tcp://208.67.220.220:443'
    
    fallback-filter:
      geoip: true
      geoip-code: CN
      ipcidr:
        - 240.0.0.0/4
        - 0.0.0.0/32
      domain:
        - +.google.com
        - +.googleapis.com
        - +.gstatic.com
        - +.googleusercontent.com
        - +.github.com
        - +.anthropic.com
        - +.openai.com
    
    direct-nameserver:
      - 223.5.5.5
      - 119.29.29.29

# 订阅配置
# 【优化点1】所有 interval 缩短为 120秒，加快坏节点剔除速度
proxy-providers:
  FeiniaoYun:
    type: http
    url: https://x1.332244.icu/api/v1/client/subscribe?token=97d6d41bdc126c7d14c39558ee2a5b3c
    interval: 3600
    path: ./providers/feiniaoyun.yaml
    filter: '(?i)(日本|JP|Japan|东京|Tokyo|大阪|Osaka|韩国|KR|Korea|Seoul|新加坡|SG|Singapore|香港|HK)'
    # 加强过滤，排除可能有问题的节点
    exclude-filter: '(?i)(学术|不保证可用|到期|剩余|流量|测试|官网|更新)'
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60 # 缩短检测间隔
      timeout: 3000
      lazy: false

