    interval: 3600
    path: ./providers/feiniaoyun.yaml
    filter: '(?i)(日本|JP|Japan|东京|Tokyo|大阪|Osaka|韩国|KR|Korea|Seoul|新加坡|SG|Singapore)'
    # 加强过滤，排除可能有问题的节点
    exclude-filter: '(?i)(学术|不保证可用|到期|剩余|流量|测试|官网|更新)'
    health-check:
